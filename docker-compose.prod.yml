# Pulls images from Docker Hub instead of building locally.
# Replace YOURUSER with your Docker Hub username before publishing.
#
#   docker-compose -f docker-compose.prod.yml up -d
#
# This file lets others run your full stack with no source clone:
#   curl -O https://raw.githubusercontent.com/YOURUSER/ats-parser/main/docker-compose.prod.yml
#   echo "OPENROUTER_API_KEY=sk-or-v1-..." > .env
#   docker-compose -f docker-compose.prod.yml up -d

services:
  api:
    image: YOURUSER/ats-parser:latest
    pull_policy: always
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://ats_user:ats_password@postgres:5432/ats_parser
      - REDIS_URL=redis://redis:6379
      - LLM_MODEL=${LLM_MODEL:-google/gemini-2.5-flash}
    volumes:
      - ./uploads:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    image: YOURUSER/ats-parser:latest
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://ats_user:ats_password@postgres:5432/ats_parser
      - REDIS_URL=redis://redis:6379
      - LLM_MODEL=${LLM_MODEL:-google/gemini-2.5-flash}
    volumes:
      - ./uploads:/app/uploads
    command: python -m arq app.workers.parse_worker.WorkerSettings

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: ats_parser
      POSTGRES_USER: ats_user
      POSTGRES_PASSWORD: ats_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ats_user -d ats_parser"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  frontend:
    image: YOURUSER/ats-parser-frontend:latest
    pull_policy: always
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
